# Dev Postgres + Redis for GhostTip.
#
#   bun run db:up        # start
#   bun run db:down      # stop
#   bun run db:logs      # tail
#
# Ports are shifted by +1 (5433 / 6380) so this stack can coexist with
# Postgres.app / Homebrew Postgres / a local Redis on their default ports.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ghosttip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghosttip
      POSTGRES_PASSWORD: ghosttip
      POSTGRES_DB: ghosttip
    ports:
      - "5433:5432"
    volumes:
      - ghosttip-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghosttip -d ghosttip"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ghosttip-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - ghosttip-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  ghosttip-pgdata:
  ghosttip-redisdata:
